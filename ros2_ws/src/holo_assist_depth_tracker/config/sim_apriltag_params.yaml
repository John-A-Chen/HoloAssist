holoassist_sim_apriltag_publisher:
  ros__parameters:
    detections_topic: /detections_all
    detections_fallback_topic: /detections
    camera_frame: camera_color_optical_frame
    publish_rate_hz: 15.0
    tag_family: 36h11

    # Board tag IDs aligned with workspace_board_node's internal corner model:
    # 0=front-left, 1=front-right, 2=rear-left, 3=rear-right.
    board_tag_ids: [0, 1, 2, 3]
    board_width_m: 0.700
    board_depth_m: 0.500
    board_tag_size_m: 0.032
    board_tag_center_edge_offset_m: 0.016

    # Synthetic board pose in camera optical frame (meters, degrees).
    board_center_in_camera_m: [0.00, 0.06, 0.95]
    board_rpy_deg: [70.0, 0.0, 0.0]

    cube_tag_size_m: 0.032
    cube_face_offset_m: 0.020

    # Four AprilCube tag groups (same IDs as cubes.yaml).
    april_cube_1_tag_ids: [10, 11, 12, 13, 14, 15]
    april_cube_2_tag_ids: [16, 17, 18, 19, 20, 21]
    april_cube_3_tag_ids: [22, 23, 24, 25, 26, 27]
    april_cube_4_tag_ids: [28, 29, 30, 31, 32, 33]

    # Cube centres in board frame (board-front-left origin, +x across width, +y depth).
    cube_centers_board_xyz: [
      0.20, 0.14, 0.020,
      0.50, 0.16, 0.020,
      0.23, 0.34, 0.020,
      0.48, 0.33, 0.020
    ]

    # Intrinsics used only to fabricate image-space corners for overlays.
    image_width: 640
    image_height: 480
    fx: 462.0
    fy: 462.0
    cx: 320.0
    cy: 240.0
    corner_scale_px_m: 900.0
    corner_min_px: 6.0
