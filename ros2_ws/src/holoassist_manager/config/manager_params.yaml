# holoassist_manager default parameters
holoassist_manager:
  ros__parameters:
    # Starting mode: MANUAL or HYBRID
    initial_mode: "MANUAL"

    # How often to publish diagnostics (Hz)
    status_publish_rate: 1.0

    # Seconds without a heartbeat before a subsystem is flagged down
    heartbeat_timeout_sec: 5.0
